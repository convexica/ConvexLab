name: CI Guardian (Lint & Test)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  quality-check:
    name: Linting & Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Linting Tools
        run: |
          pip install ruff

      - name: Run Ruff (Linter)
        run: ruff check .

      - name: Run Ruff (Formatter Check)
        run: ruff format --check .

  unit-tests:
    name: Financial Logic Tests
    runs-on: ubuntu-latest
    needs: quality-check # Run tests only if linting passes
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install .
          pip install pytest

      - name: Run Pytest
        run: pytest tests/
